name: Verify Windows

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  cli:
    strategy:
      matrix:
        include:
          - os: windows-latest
            asset: gloomberb-windows-x64.exe.gz
          - os: windows-11-arm
            asset: gloomberb-windows-arm64.exe.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Test
        run: bun test src/updater.test.ts src/app/global-shortcuts.test.tsx

      - name: Build standalone CLI
        run: bun run scripts/build.ts

      - name: Verify standalone CLI artifact
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\${{ matrix.asset }}")) {
            throw "Missing standalone Windows CLI archive: ${{ matrix.asset }}"
          }

  desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build Windows desktop package
        shell: pwsh
        run: ./scripts/build-windows-desktop-package.ps1

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: ./scripts/build-windows-installer.ps1

      - name: Verify Windows desktop artifacts
        shell: pwsh
        run: ./scripts/verify-windows-desktop.ps1

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gloomberb-windows-x64-verification-artifacts
          path: |
            artifacts/*
            build/stable-win-x64/Gloomberb-inno-source/Gloomberb/**

  desktop-arm64-compat:
    needs: desktop
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: gloomberb-windows-x64-verification-artifacts
          path: .

      - name: Verify x64 desktop package on Windows ARM64
        shell: pwsh
        run: ./scripts/verify-windows-desktop.ps1
